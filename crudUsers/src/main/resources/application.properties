micronaut.application.name=logConsumer
micronaut.server.port=8081
# Kafka Config
kafka.bootstrap.servers=localhost:9092
kafka.client-id=micronaut-crud

# ============================
# Producer (padr�o)
# Topics
kafka.topics.error=topic-error
kafka.topics.warn-info=warn-info-topic

# Consumer Kafka
kafka.consumers.default.group-id=logs-consumer-group
kafka.consumers.default.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
kafka.consumers.default.value-deserializer=io.confluent.kafka.serializers.protobuf.KafkaProtobufDeserializer
kafka.consumers.default.specific.protobuf.value.type=com.crud.entities.protobuf.LogMessageProto

# MongoDB
mongodb.uri=mongodb://localhost:27017/treinamento